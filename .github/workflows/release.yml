name: Build and Release Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore FileOrganizer/FileOrganizer.csproj

    - name: Publish Windows 11 Standalone Executable
      # Compiles into a single self-contained Win-x64 .exe (so user doesn't need .NET installed)
      run: dotnet publish FileOrganizer/FileOrganizer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o release_output

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FileOrganizer-Windows-Executable
        path: release_output/FileOrganizer.exe

    - name: Publish GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: release_output/FileOrganizer.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
